<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <meta name="description" content="Wood sheet cutting optimizer and quotation generator">
    <title>Maa Wadi Mv</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
    <link rel="icon" type="image/png" href="/assets/icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="brand">
                <img src="assets/logo.png" alt="Maa Wadi Mv" class="logo">
                <span class="brand-name">Maa Wadi Mv</span>
            </div>
            <nav>
                <ul>
                    <li><a href="#" class="active"><i class="fas fa-calculator"></i></a></li>
                    <li><a href="#" id="saveProjectBtn"><i class="fas fa-save"></i></a></li>
                    <li><a href="#" id="loadProjectBtn"><i class="fas fa-folder-open"></i></a></li>
                    <li class="units-dropdown">
                        <i class="fas fa-ruler"></i>
                        <select id="unitSelector" class="unit-select">
                            <option value="mm">mm</option>
                            <option value="cm">cm</option>
                            <option value="m">m</option>
                            <option value="in">in</option>
                        </select>
                    </li>
                    <li><a href="#" id="settingsBtn"><i class="fas fa-cog"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="input-section">
                <div class="card">
                    <h2><i class="fas fa-ruler-combined"></i> Wood Piece Details</h2>
                    <div class="form-grid" style="margin-top: 1rem;">
                        <div class="form-group">
                            <label for="csvFileInput"><i class="fas fa-file-upload"></i> Import CSV</label>
                            <input type="file" id="csvFileInput" accept=".csv,text/csv">
                        </div>
                        <div class="form-group">
                            <label for="csvReplaceExisting">
                                <i class="fas fa-broom"></i> Replace existing
                            </label>
                            <input type="checkbox" id="csvReplaceExisting">
                        </div>
                        <div class="form-group">
                            <label for="csvWoodOnly">
                                <i class="fas fa-filter"></i> Wood only
                            </label>
                            <input type="checkbox" id="csvWoodOnly" checked>
                        </div>
                        <div class="form-group" style="align-self: end;">
                            <button type="button" class="btn" id="importCsvBtn">
                                <i class="fas fa-bolt"></i> Fast Add from CSV
                            </button>
                        </div>
                    </div>
                    <div id="csvImportStatus" style="margin-top: 0.5rem;"></div>
                    <form id="piece-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="length">
                                    <i class="fas fa-arrows-alt-h"></i> Length
                                    <span class="unit-label">(mm)</span>
                                </label>
                                <input type="number" id="length" required min="1" max="2440" placeholder="Max 2440">
                            </div>
                            <div class="form-group">
                                <label for="width">
                                    <i class="fas fa-arrows-alt-v"></i> Width
                                    <span class="unit-label">(mm)</span>
                                </label>
                                <input type="number" id="width" required min="1" max="1220" placeholder="Max 1220">
                            </div>
                            <div class="form-group">
                                <label for="quantity"><i class="fas fa-layer-group"></i> Quantity</label>
                                <input type="number" id="quantity" required min="1" value="1">
                            </div>
                        </div>

                        <div class="teak-section">
                            <label><i class="fas fa-border-all"></i> Teak Sides:</label>
                            <div class="teak-options">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="teak" value="top"> Top
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="teak" value="bottom"> Bottom
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="teak" value="left"> Left
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="teak" value="right"> Right
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-plus"></i> Add Piece
                        </button>
                    </form>
                </div>
            </section>

            <section class="output-section">
                <div class="card">
                    <h2><i class="fas fa-th"></i> Sheet Layout</h2>
                    <div id="sheet-container"></div>
                </div>

                <div class="card">
                    <h2><i class="fas fa-list"></i> Pieces List</h2>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Piece ID</th>
                                    <th>Dimensions</th>
                                    <th>Sheet</th>
                                    <th>Teak Sides</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="pieces-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h2><i class="fas fa-info-circle"></i> Sheet Details</h2>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Sheet</th>
                                    <th>Remaining Area (<span class="unit-area">m²</span>)</th>
                                    <th>Remaining Length (<span class="unit-label">mm</span>)</th>
                                    <th>Remaining Width (<span class="unit-label">mm</span>)</th>
                                    <th>Number of Cuts</th>
                                    <th>Teak (<span class="unit-length">m</span>)</th>
                                </tr>
                            </thead>
                            <tbody id="sheet-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h2><i class="fas fa-file-invoice-dollar"></i> Quotation</h2>
                    <div id="quotation"></div>
                    <div class="action-buttons">
                        <button class="btn" id="printQuotation">
                            <i class="fas fa-print"></i> Print
                        </button>
                        <button class="btn" id="exportPDF">
                            <i class="fas fa-file-pdf"></i> Export PDF
                        </button>
                        <button class="btn" id="shareQuotation">
                            <i class="fas fa-share-alt"></i> Share
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="social-links">
                <a href="#" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="#" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
            <p>&copy; 2023 Maa Wadi Mv. Powered by <a href="https://github.com/Rettey-G" class="credit-link">Retts Web Dev</a></p>
        </div>
    </footer>

    <!-- PWA Support -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => console.log('ServiceWorker registered'))
                .catch(error => console.log('ServiceWorker registration failed:', error));
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js?v=13"></script>
    <script src="units.js?v=13"></script>
</body>
</html>
